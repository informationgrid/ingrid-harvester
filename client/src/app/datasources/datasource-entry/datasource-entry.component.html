<ingrid-list-item-expandable
  *transloco="let t; read: 'harvester'"
  [title]="datasource().description"
  [subtitle]="datasource().sourceURL"
>
  <ng-container header-content>
    <harvester-status-indicator
      [datasource]="datasource()"
      [importLog]="importLog()"
    />

    <harvester-progress-indicator [importLog]="importLog()" />
  </ng-container>

  <ng-container header-end>
    <div class="flex-row self-center">
      <button
        #actionMenuBtn="matMenuTrigger"
        matIconButton
        color="primary"
        matTooltip="{{ t('more') }}"
        aria-label="{{ t('more') }}"
        (click)="openActionMenu($event)"
        (keydown.enter)="openActionMenu($event)"
        [matMenuTriggerFor]="actionMenu"
        data-test="more"
      >
        <mat-icon svgIcon="Options" />
      </button>
      <mat-menu data-test="action-menu" #actionMenu>
        @if (canEdit()) {
          <button
            mat-menu-item
            [disabled]="importLog() !== undefined && !importLog().complete"
            (click)="onImport.emit()"
            data-test="import"
          >
            <mat-icon svgIcon="Harvester" />
            {{ t("import") }}
          </button>
          <button
            mat-menu-item
            [disabled]="importLog() !== undefined && !importLog().complete"
            (click)="onIncrementImport.emit()"
            data-test="importIncrement"
          >
            <mat-icon svgIcon="Harvester" />
            {{ t("importIncrement") }}
          </button>
          <button mat-menu-item (click)="onEdit.emit()" data-test="edit">
            <mat-icon svgIcon="cursor-edit" />
            {{ t("edit") }}
          </button>
          <button mat-menu-item (click)="onDelete.emit()" data-test="delete">
            <mat-icon color="warn" svgIcon="delete" />
            {{ t("delete") }}
          </button>
          <button
            mat-menu-item
            (click)="onDuplicate.emit()"
            data-test="duplicate"
          >
            <mat-icon svgIcon="Copy" />
            {{ t("duplicate") }}
          </button>
          <button mat-menu-item (click)="onSchedule.emit()" data-test="schedule">
            <mat-icon svgIcon="schedule" />
            {{ t("schedule") }}
          </button>
        }
        <button mat-menu-item (click)="onHistory.emit()" data-test="history">
          <mat-icon svgIcon="Timeline" />
          {{ t("history") }}
        </button>
        <button mat-menu-item (click)="onOpenErrorLog.emit()" data-test="log">
          <mat-icon svgIcon="logging" />
          {{ t("log") }}
        </button>
      </mat-menu>
    </div>
  </ng-container>

  <ng-container content>
    <harvester-datasource-detail
      [datasource]="datasource()"
      [importLog]="importLog()"
      (onOpenErrorLog)="onOpenErrorLog.emit()"
      (onOpenWarningLog)="onOpenWarningLog.emit()"
    />
  </ng-container>
</ingrid-list-item-expandable>
