@if (isLoaded()) {
  <ingrid-overview-template
    *transloco="let t"
    [title]="t('pageTitle.datasources')"
    contextHelpId="about_harvester"
  >
    <ng-container header-actions>
      @if (canEdit()) {
        <button
          matButton="filled"
          color="primary"
          (click)="onAdd()"
          aria-label="{{ t('common.add') }}"
          id="btnAddHarvester"
        >
          <mat-icon svgIcon="Add" />
          {{ t("common.add") }}
        </button>
      }

      @if (hasDatasources()) {
        @if (canEdit()) {
          <button
            matIconButton
            color="primary"
            matTooltip="{{ t('common.more') }}"
            aria-label="{{ t('common.more') }}"
            [matMenuTriggerFor]="optionMenu"
            data-test="datasources-more"
          >
            <mat-icon svgIcon="Options" />
          </button>
          <mat-menu data-test="action-menu" #optionMenu>
            <button
              mat-menu-item
              (click)="onImportAll()"
              data-test="import-all"
            >
              <mat-icon svgIcon="Harvester" />
              {{ t("datasources.importAll") }}
            </button>
          </mat-menu>
        }
      }
    </ng-container>

    <ng-container content>
      <mat-accordion>
        @for (group of groupedDatasources() | keyvalue; track group.key) {
          <h3>
            <mat-icon svgIcon="Harvester" aria-hidden="true" />
            <span>{{ group.key }}</span>
          </h3>

          @for (datasource of group.value; track datasource.id) {
            <harvester-datasource-entry
              [datasource]="datasource"
              [canEdit]="canEdit()"
              [importLog]="
                importLogs() ? importLogs()[datasource.id] : undefined
              "
              (onImport)="onImport(datasource.id)"
              (onIncrementImport)="onImport(datasource.id, true)"
              (onView)="onView(datasource)"
              (onEdit)="onEdit(datasource)"
              (onDelete)="onDelete(datasource)"
              (onDuplicate)="onDuplicate(datasource)"
              (onSchedule)="onSchedule(datasource)"
              (onHistory)="onShowHistory(datasource)"
              (onJobs)="onShowJobs(datasource)"
              (onOpenErrorLog)="onShowLogs(datasource.id)"
              (onOpenWarningLog)="onShowLogs(datasource.id)"
            />
          }
        }
      </mat-accordion>
    </ng-container>
  </ingrid-overview-template>
} @else {
  <div
    class="size-full flex-col items-center justify-center gap-24"
    *transloco="let t"
  >
    <ingrid-circular-progress-indicator [size]="50" [strokeWidth]="5" />
    <div>{{ t("common.loading") }}</div>
  </div>
}
