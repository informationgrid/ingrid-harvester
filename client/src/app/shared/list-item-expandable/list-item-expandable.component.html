<mat-expansion-panel [hideToggle]="hideToggle()">
  <mat-expansion-panel-header expandedHeight="auto" collapsedHeight="auto">
    <div class="w-full flex-col align-items-stretch">
      <div class="flex-col gap-8">
        @if (title()) {
          <div class="text-lg font-medium break-word title">
            {{ title() }}
          </div>
        }

        @if (subtitle()) {
          <div class="text-hint font-normal break-word line-clamp-1 subtitle">
            {{ subtitle() }}
          </div>
        }
      </div>

      <ng-content select="[header-content]" />
    </div>

    <ng-content select="[header-end]" />
  </mat-expansion-panel-header>

  <mat-divider class="!-mx-4" />
  <ng-content select="[content]" />
</mat-expansion-panel>
