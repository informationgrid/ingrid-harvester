<mat-nav-list
  [class.collapsed]="!menuIsExpanded"
  *transloco="let t"
  aria-label="Hauptmenü"
  role="menu"
>
  @for (item of menuItems | async; track item) {
    <a
      mat-list-item
      tabindex="0"
      role="menuitem"
      [matTooltip]="t(item.title)"
      matTooltipPosition="right"
      [matTooltipDisabled]="menuIsExpanded"
      [attr.aria-label]="t(item.title)"
      [activated]="currentRoute?.indexOf(item.path) === 0"
      (click)="goToPage(item.path)"
      (keydown.enter)="goToPage(item.path)"
      [attr.data-cy]="item.path"
    >
      <mat-icon matListItemIcon [svgIcon]="item.data?.icon"></mat-icon>
      <p matListItemTitle aria-hidden="true">{{ t(item.title) }}</p>
    </a>
  }

  <div class="flex-1"></div>

  <a
    mat-list-item
    tabindex="0"
    role="menuitem"
    class="menu-toggle no-text-transform"
    matTooltipPosition="right"
    [matTooltip]="t(menuIsExpanded ? 'common.collapse' : 'common.expand')"
    [matTooltipDisabled]="menuIsExpanded"
    [attr.aria-label]="t(menuIsExpanded ? 'common.collapse' : 'common.expand')"
    (click)="toggleSidebar()"
    (keydown.enter)="toggleSidebar()"
    data-cy="menu-scale"
  >
    @if (!menuIsExpanded) {
      <mat-icon matListItemIcon svgIcon="Nav-auf"></mat-icon>
    }
    @if (menuIsExpanded) {
      <mat-icon matListItemIcon svgIcon="Nav-zu"></mat-icon>
    }
    <p matListItemTitle aria-hidden="true">Verkleinern</p>
  </a>
</mat-nav-list>
