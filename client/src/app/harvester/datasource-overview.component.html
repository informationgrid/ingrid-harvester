@if (datasourcesLoaded()) {
  <harvester-overview-template
    *transloco="let t"
    [title]="t('menu.datasources')"
    contextHelpId="about_harvester"
  >
    <ng-container header-actions *transloco="let t; read: 'harvester'">
      <button
        matButton="filled"
        color="primary"
        (click)="onAdd()"
        aria-label="{{ t('add') }}"
        id="btnAddHarvester"
      >
        <mat-icon svgIcon="Add" />
        {{ t("add") }}
      </button>

      <button
        matIconButton
        color="primary"
        matTooltip="{{ t('more') }}"
        aria-label="{{ t('more') }}"
        [matMenuTriggerFor]="optionMenu"
      >
        <mat-icon svgIcon="Options" />
      </button>
      <mat-menu data-test="action-menu" #optionMenu>
        <button
          mat-menu-item
          [disabled]="!hasDatasources()"
          (click)="onImportAll()"
          data-test="import-all"
        >
          <mat-icon svgIcon="Harvester" />
          {{ t("importAll") }}
        </button>
      </mat-menu>
    </ng-container>

    <ng-container content>
      <mat-accordion>
        @for (item of datasources() | keyvalue; track item.key) {
          <harvester-datasource-entry
            [datasource]="item.value"
            [importLog]="importLogs() ? importLogs()[item.value.id] : undefined"
            (onImport)="onImport(item.value.id)"
            (onIncrementImport)="onImport(item.value.id, true)"
            (onEdit)="onEdit(item.value)"
            (onDelete)="onDelete(item.value)"
            (onDuplicate)="onDuplicate(item.value)"
            (onSchedule)="onSchedule(item.value)"
            (onHistory)="showHistory(item.value)"
            (onOpenErrorLog)="onShowLogs(item.value.id)"
            (onOpenWarningLog)="onShowLogs(item.value.id)"
          />
        }
      </mat-accordion>
    </ng-container>
  </harvester-overview-template>
} @else {
  <div class="no-harvester">
    <mat-spinner diameter="100"></mat-spinner>
  </div>
}
